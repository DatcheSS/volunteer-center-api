version: '3.8'

services:
  volunteer-center-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volunteer-center-api
    restart: unless-stopped
    ports:
      - "8080:8080" 
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"] 
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    volumes:
      - ./appsettings.Production.json:/app/appsettings.Production.json:ro
      - ./logs:/app/logs
    env_file:
      - .env

networks:
  default:
    name: volunteer-center-network